name: Nightly traffic snapshot

on:
  schedule:
    # 03:00 UTC daily — after GitHub's traffic counters roll over.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_PAT }}
          GITHUB_TOKEN_PERSONAL: ${{ secrets.TRAFFIC_PAT_PERSONAL }}
          CLARITY_TOKEN_HUB: ${{ secrets.CLARITY_TOKEN_HUB }}
          CLARITY_TOKEN_PERSONAL: ${{ secrets.CLARITY_TOKEN_PERSONAL }}
        run: python scripts/snapshot_traffic.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/traffic-history.json
          if git diff --cached --quiet; then
            echo "No traffic changes."
          else
            git commit -m "chore: nightly traffic snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
